<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pacific Sea Level Intelligence Dashboard</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>

<style>
body{
margin:0;
font-family:Inter, sans-serif;
background:#061018;
color:#eaf3f1;
}

header{
padding:20px 40px;
border-bottom:1px solid #1d3c4c;
display:flex;
justify-content:space-between;
}

.hero{
padding:80px 40px;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.section{
padding:60px 40px;
border-top:1px solid #1d3c4c;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.card{
background:#0e2433;
padding:20px;
border-radius:12px;
border:1px solid #1d3c4c;
}

.badge{
display:inline-block;
padding:4px 10px;
border-radius:20px;
font-size:12px;
margin-bottom:10px;
}

.high{background:#ff4d4d;}
.medium{background:#ffb84d;}
.low{background:#2fb8a6;}

.insight{
background:#102a3b;
padding:20px;
border-left:4px solid #2fb8a6;
}
</style>
</head>

<body>

<header>
<div>🌊 Pacific Sea Level Intelligence</div>
<div>1993–2023 Climate Dataset</div>
</header>

<div class="hero">
<h1>Sea Level Rising Across the Pacific</h1>
<p>Interactive Climate Intelligence Dashboard with Auto Insights & Risk Scoring</p>
</div>

<div class="section">
<h2>🔥 AI Generated Insights</h2>
<div id="insight" class="insight"></div>
</div>

<div class="section">
<h2>🌍 Regional Risk Overview</h2>
<div class="grid" id="region"></div>
</div>

<div class="section">
<h2>📊 Country Risk Ranking</h2>
<div class="grid" id="ranking"></div>
</div>

<script>
// ================= DATA =================
const data = [
{ name:"Tuvalu", region:"Polynesia", rise:10, trend:4.4 },
{ name:"Kiribati", region:"Micronesia", rise:10, trend:3.9 },
{ name:"Fiji", region:"Melanesia", rise:12, trend:4.1 },
{ name:"Vanuatu", region:"Melanesia", rise:14, trend:4.6 },
{ name:"Papua New Guinea", region:"Melanesia", rise:14, trend:5.4 },
{ name:"Palau", region:"Micronesia", rise:18, trend:4.8 },
{ name:"Samoa", region:"Polynesia", rise:10, trend:4.5 }
];

// ================= RISK ENGINE =================
function riskLevel(trend){
if(trend >= 5) return "high";
if(trend >= 4) return "medium";
return "low";
}

// ================= INSIGHT ENGINE =================
function generateInsight(){
let max = data.reduce((a,b)=> a.rise > b.rise ? a : b);

return `
The highest sea level increase is recorded in <b>${max.name}</b> with ${max.rise} cm since 1993.
The Pacific region shows a consistent upward trend across all monitored countries.
No country shows a reversal trend, indicating persistent climate pressure.
`;
}

document.getElementById("insight").innerHTML = generateInsight();

// ================= REGION SUMMARY =================
const regionMap = {};

data.forEach(d=>{
if(!regionMap[d.region]){
regionMap[d.region] = {total:0,count:0};
}
regionMap[d.region].total += d.trend;
regionMap[d.region].count += 1;
});

const regionContainer = document.getElementById("region");

Object.keys(regionMap).forEach(r=>{
let avg = (regionMap[r].total / regionMap[r].count).toFixed(2);

regionContainer.innerHTML += `
<div class="card">
<h3>${r}</h3>
<p>Average trend: <b>${avg} mm/year</b></p>
<p class="badge ${riskLevel(avg)}">${riskLevel(avg).toUpperCase()} RISK</p>
</div>
`;
});

// ================= RANKING =================
data.sort((a,b)=>b.rise - a.rise);

const rank = document.getElementById("ranking");

data.forEach(d=>{
rank.innerHTML += `
<div class="card">
<h3>${d.name}</h3>
<p>Sea level rise: <b>${d.rise} cm</b></p>
<p>Trend: ${d.trend} mm/year</p>
<p class="badge ${riskLevel(d.trend)}">${riskLevel(d.trend).toUpperCase()}</p>
</div>
`;
});
</script>

</body>
</html>
